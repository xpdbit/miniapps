prompts:
  dir: prompts
  explore: '/ulw-loop 请探索 【项目】{project_label}（源码目录: {source_dirs}，忽略 {exclude_dirs}
    和 .git）， 发现需要改进的领域，生成 **粗粒度** 的任务提议。

    重点关注： - 需要修复一批相关文件的问题（如：某个模块的类型错误、API 路由缺少校验） - 可以增加的一项独立功能（如：添加数据导出功能、新增筛选条件）
    - 需要重构的模块（如：将某个组件拆分为更小的子组件）

    ## 任务粒度指南（基于 AI Agent 工程最佳实践） - 每项任务应可由一个 agent 会话在 20 分钟内完成（3-8 个 tool call）
    - 采用垂直切片：按功能路径而非技术层次分解 - 如果任务描述超过 150 字，很可能过大，应考虑拆分 - 不要将多个独立项目的工作合并为一个任务

    ## 优先级分配规则 | 优先级 | 含义 | 适用场景 | |--------|------|----------| | fix P0 | 最高修复优先级
    | 安全漏洞、数据丢失、线上崩溃 | | fix P1 | 高修复优先级 | 功能缺陷、用户体验严重受损 | | fix P2 | 中修复优先级 | 类型错误、轻微功能问题
    | | fix P3 | 低修复优先级 | 代码风格、轻微优化、注释缺失 | | idea | 点子/建议 | 新功能提议、改进想法、无紧急度 |

    ## 输出要求 将任务列表以 YAML 格式写入 state/proposed_tasks.yaml，格式如下： ```yaml - id: 1 description:
    任务描述（适中粒度，3-8 个 tool call 可完成） priority: fix P3 status: proposed project: {project_label}
    ```

    注意： - project 字段：必须根据任务涉及的文件路径/模块名推断实际归属项目。 可用项目列表: {project_list} **推断优先级**:
    1. 优先从上述项目列表中匹配（如描述含 "tavern-miniapp" → AI-Tavern 角色聊天） 2. 如果无法从列表匹配，读取 AGENTS.md
    或 docs/ 目录确认项目归属 3. 仍然无法确定时，使用 "{project_label}" 作为兜底值 严禁：探索全部项目时将所有任务都标记为 "全部项目"
    — 每条任务必须归属到具体项目。 - 不要添加 proposed_at 时间字段（时间由系统脚本自动添加） - 仅写入新发现的任务，系统会自动合并已有任务

    注意：仅写入 YAML 文件，不要执行任何任务，不要修改其他文件。

    ## 🚫 严禁事项（违反会导致 opencode 终止会话） - ❌ 输出纯文本等待消息 - ❌ 输出任何不含 tool call 的纯文本段落 - ✅ 每一条文本输出之后，必须立即跟随至少一个
    tool call

    完成后请输出 ===TASK_DONE==='
  update_proposed: '/ulw-loop 以下是当前待审批任务列表：

    {content}

    请根据项目最新状态逐一检查每项： - 已完成的任务标记 status: done - 不再有效的任务标记 status: cancelled - 需要调整描述的更新
    description - 可补充新任务（粗粒度：至少涉及多个文件或一项完整功能）

    将更新后的完整列表写回 state/proposed_tasks.yaml（保持 YAML 格式）。 注意：仅更新 YAML 文件，不要执行任务。 不要修改或添加
    proposed_at 字段（时间由系统脚本自动管理）。

    ## 🚫 严禁事项（违反会导致 opencode 终止会话） - ❌ 输出纯文本等待消息 - ❌ 输出任何不含 tool call 的纯文本段落 - ✅ 每一条文本输出之后，必须立即跟随至少一个
    tool call

    完成后请输出 ===TASK_DONE==='
  execute: '/ulw-loop 请执行以下开发任务：

    任务描述：{desc}

    要求： - 完成后，修改 state/approved_queue.yaml 中对应项的 status 为 done。 - 若遇到无法自动完成的错误，将 status
    改为 error，并在 error 字段中附加原因。 - 若需追加新任务，写入 proposed_tasks.yaml（status: proposed，待人工审批）。
    - 忽略 plan 文件夹。

    ## 🔄 后台子任务等待策略 如果派出了后台子任务，必须用 background_output 轮询，不要输出等待文本： - ✅ 正确：直接调用 background_output(task_id="xxx")
    检查结果 - ❌ 错误：输出 "waiting..."、"<!-- 等待 -->"、"正在等待..."、或任何不含 tool call 的纯文本

    ## 🚫 严禁事项（违反会导致 opencode 终止会话） - ❌ 输出纯文本等待消息 - ❌ 输出任何不含 tool call 的纯文本段落 - ✅ 每一条文本输出之后，必须立即跟随至少一个
    tool call

    完成后请输出 ===TASK_DONE==='
  theme: dark
ui:
  theme: dark
agent:
  timeout: 1200
  model: deepseek/deepseek-v4-flash
  model_explore: deepseek/deepseek-v4-flash
  model_execute: deepseek/deepseek-v4-pro
  model_verify: deepseek/deepseek-v4-flash
  model_push: deepseek/deepseek-v4-flash
  model_evaluate: deepseek/deepseek-v4-pro
behavior:
  auto_push: false
  cycle_interval: 5
  max_retries: 2
  max_tokens_per_cycle: 0
  proposed_target_count: 200
