prompts:
  explore: ''
  update_proposed: ''
  execute: ''
ui:
  theme: dark
agent:
  timeout: 1200
behavior:
  auto_push: false
  cycle_interval: 5
  max_retries: 2
  # Worktree 隔离执行（每个任务在独立 git worktree 中执行）
  use_worktree: false
  worktrees_dir: ".worktrees"
  # 会话持久化与断点续跑
  checkpoint_interval: 300
  max_sessions: 10
  auto_resume: false
  # 事件驱动（Webhook + Cron）
  webhook:
    enabled: false
    port: 9090
    secret: ""
  cron:
    enabled: false
    jobs: []
# Prompt 编排引擎（动态选择模板和工具）
prompt_orchestrator:
  enabled: false
  tool_context_max_chars: 800
  project_context_max_chars: 1500
  tool_preferences:
    explore: ["explore", "librarian"]
    execute: ["deep", "quick"]
    fix: ["systematic-debugging"]
    refactor: ["deep"]
    feature: ["brainstorming", "visual-engineering"]
