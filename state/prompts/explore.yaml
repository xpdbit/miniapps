# SuperTask Prompt Template
# 名称: 探索与提议
# 版本: 1.0
# 支持变量替换: ${variable_name}
---
name: 探索与提议
version: '1.0'
template: "/ulw-loop\n请探索 【项目】${project_label}（源码目录: ${source_dirs}，忽略 ${exclude_dirs}\
  \ 和 .git），\n发现需要改进的领域，生成 **粗粒度** 的任务提议。\n\n重点关注：\n- 需要修复一批相关文件的问题（如：某个模块的类型错误、API\
  \ 路由缺少校验）\n- 可以增加的一项独立功能（如：添加数据导出功能、新增筛选条件）\n- 需要重构的模块（如：将某个组件拆分为更小的子组件）\n\n## 任务粒度指南（基于\
  \ AI Agent 工程最佳实践）\n- 每项任务应可由一个 agent 会话在 20 分钟内完成（3-8 个 tool call）\n- 采用垂直切片：按功能路径而非技术层次分解\n\
  - 如果任务描述超过 150 字，很可能过大，应考虑拆分\n- 不要将多个独立项目的工作合并为一个任务\n\n## 优先级分配规则\n| 优先级 | 含义 |\
  \ 适用场景 |\n|--------|------|----------|\n| fix P0 | 最高修复优先级 | 安全漏洞、数据丢失、线上崩溃 |\n\
  | fix P1 | 高修复优先级 | 功能缺陷、用户体验严重受损 |\n| fix P2 | 中修复优先级 | 类型错误、轻微功能问题 |\n| fix P3\
  \ | 低修复优先级 | 代码风格、轻微优化、注释缺失 |\n| idea | 点子/建议 | 新功能提议、改进想法、无紧急度 |\n\n## 输出要求\n将任务列表以\
  \ YAML 格式写入 state/proposed_tasks.yaml，格式如下：\n```yaml\n- id: 1\n  description: 任务描述（适中粒度，3-8\
  \ 个 tool call 可完成）\n  priority: fix P3\n  status: proposed\n  project: ${project_label}\n\
  ```\n\n注意：\n- project 字段：必须根据任务涉及的文件路径/模块名推断实际归属项目。\n  可用项目列表: ${project_list}\n\
  \  **推断优先级**:\n  1. 优先从上述项目列表中匹配（如描述含 \"tavern-miniapp\" → AI-Tavern 角色聊天）\n  2.\
  \ 如果无法从列表匹配，读取 AGENTS.md 或 docs/ 目录确认项目归属\n  3. 仍然无法确定时，使用 \"${project_label}\"\
  \ 作为兜底值\n  严禁：探索全部项目时将所有任务都标记为 \"全部项目\" — 每条任务必须归属到具体项目。\n- 不要添加 proposed_at 时间字段（时间由系统脚本自动添加）\n\
  - 仅写入新发现的任务，系统会自动合并已有任务\n\n注意：仅写入 YAML 文件，不要执行任何任务，不要修改其他文件。\n\n## 严禁事项\n- 不要输出纯文本等待消息\n\
  - 每一条文本输出之后，必须立即跟随至少一个 tool call\n\n完成后请输出 ===TASK_DONE==="
