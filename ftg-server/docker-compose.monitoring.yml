# =============================================================================
# FTG_Server — 监控栈 (Prometheus + Grafana)
# 使用方式:
#   docker compose -f docker-compose.monitoring.yml up -d
#   docker compose -f docker-compose.monitoring.yml down
#
# Grafana 默认地址: http://localhost:3001
#   初始账号: admin / admin（首次登录强制修改）
# Prometheus 地址: http://localhost:9090
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Prometheus — 指标采集与存储
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ftg-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # 挂载 Prometheus 配置文件
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # 持久化指标数据
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'   # 数据保留 15 天
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'               # 支持热加载配置 (curl -X POST localhost:9090/-/reload)
    networks:
      - ftg-monitoring-network

  # ---------------------------------------------------------------------------
  # Grafana — 指标可视化面板
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.3.0
    container_name: ftp-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"  # 主机 3001 → 容器 3000（避免与主服务 3000 冲突）
    environment:
      # Prometheus 数据源预配置（Grafana 启动时自动添加）
      GF_INSTALL_PLUGINS: ""  # 如需安装额外插件，在此添加
      GF_SECURITY_ADMIN_PASSWORD: admin  # 首次登录密码，建议启动后立即修改
      # Prometheus 数据源自动配置
      GF_DATASOURCES: "prometheus"
      GF_DATASOURCE_PROMETHEUS_TYPE: prometheus
      GF_DATASOURCE_PROMETHEUS_URL: http://prometheus:9090
      GF_DATASOURCE_PROMETHEUS_ACCESS: proxy
      GF_DATASOURCE_PROMETHEUS_ISDEFAULT: "true"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ftg-monitoring-network

  # ---------------------------------------------------------------------------
  # [可选] Node Exporter — 主机级别指标 (CPU/内存/磁盘/网络)
  # 如需使用，取消下方注释
  # ---------------------------------------------------------------------------
  # node-exporter:
  #   image: prom/node-exporter:v1.8.2
  #   container_name: ftg-node-exporter
  #   restart: unless-stopped
  #   ports:
  #     - "9100:9100"
  #   volumes:
  #     - /proc:/host/proc:ro
  #     - /sys:/host/sys:ro
  #     - /:/rootfs:ro
  #   command:
  #     - '--path.procfs=/host/proc'
  #     - '--path.sysfs=/host/sys'
  #     - '--path.rootfs=/rootfs'
  #   networks:
  #     - ftg-monitoring-network

# =============================================================================
# 持久化卷
# =============================================================================
volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# =============================================================================
# 内部网络
# =============================================================================
networks:
  ftg-monitoring-network:
    driver: bridge
