# =============================================================================
# FTG_Server Docker Compose
# 编排 Nginx + MySQL + Redis + PP-ShiTuV2 + 主服务
# =============================================================================
# 使用方式：
#   docker compose --env-file .env.production up -d
#   docker compose --env-file .env.production down
# =============================================================================
# 架构说明：
#   Nginx (443/80) -> server (3000) [内部]
#   Nginx (443/80) -> ppshituv2 (5000) [内部]
#   server 和 ppshituv2 不直接暴露到互联网
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # MySQL 8.0 数据库
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: ftg-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-food_theme_generator}
      MYSQL_USER: ${MYSQL_USER:-ftg_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ftg-network

  # ---------------------------------------------------------------------------
  # Redis 7 缓存
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ftg-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ftg-network

  # ---------------------------------------------------------------------------
  # PP-ShiTuV2 食物识别微服务 (Python)
  # ---------------------------------------------------------------------------
  ppshituv2:
    build:
      context: ./services/ppshituv2
      dockerfile: Dockerfile
    container_name: ftg-ppshituv2
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      FLASK_PORT: 5000
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c=http.client.HTTPConnection('localhost:5000'); c.request('GET','/health'); r=c.getresponse(); exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ftg-network

  # ---------------------------------------------------------------------------
  # FTG_Server Node.js 主服务（内部，不直接暴露到互联网）
  # ---------------------------------------------------------------------------
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ftg-server
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      # Docker 内部服务发现 — 覆盖 .env.production 中的 localhost 地址
      FTG_DATABASE_URL: mysql://${MYSQL_USER:-ftg_user}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-food_theme_generator}?connection_limit=5&pool_timeout=10
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      PPSHITU_SERVICE_URL: http://ppshituv2:5000
      NODE_ENV: production
    networks:
      - ftg-network

  # ---------------------------------------------------------------------------
  # Nginx 反向代理（唯一对外暴露的入口）
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ftg-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server
      - ppshituv2
    volumes:
      # SSL 证书（生产环境通过 certbot 生成，或手动放置）
      - ./nginx/ssl:/etc/nginx/ssl
      # Certbot ACME 验证目录
      - certbot_data:/var/www/certbot
      # Certbot 配置持久化（避免每次重新申请）
      - certbot_conf:/etc/letsencrypt
    networks:
      - ftg-network

# =============================================================================
# 持久化卷
# =============================================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  certbot_data:
    driver: local
  certbot_conf:
    driver: local

# =============================================================================
# 内部网络
# =============================================================================
networks:
  ftg-network:
    driver: bridge
