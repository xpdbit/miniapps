# =============================================================================
# FTG_Server Nginx Reverse Proxy Configuration
# 反向代理 HTTPS，支持 Certbot 自动续签
# =============================================================================
# 使用方式：
#   生产环境首次：docker compose --env-file .env.production up -d nginx
#   SSL 手动申请：docker compose exec nginx certbot --nginx -d your-domain.com
# =============================================================================

# ---- 运行用户 ----
user nginx;

# ---- 工作进程（自动检测 CPU 核心数） ----
worker_processes auto;

# ---- 错误日志 ----
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# ---- 事件模块 ----
events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

# ---- HTTP 模块 ----
http {

    # =========================================================================
    # 基础设置
    # =========================================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 高效文件传输
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # 长连接超时
    keepalive_timeout 65;

    # 客户端最大 body 大小（文件上传）
    client_max_body_size 10M;

    # 关闭 Nginx 版本号
    server_tokens off;

    # =========================================================================
    # Gzip 压缩
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        application/x-httpd-php
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2;

    # =========================================================================
    # 速率限制区域
    # =========================================================================
    # API 限制：每 IP 每秒 10 请求，burst 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # =========================================================================
    # SSL 配置
    # =========================================================================
    # SSL 会话缓存
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全协议和加密套件
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 证书路径（通过 certbot 或手动挂载）
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # =========================================================================
    # upstream 后端服务定义
    # =========================================================================

    # FTG_Server Node.js 主服务
    upstream ftg-server {
        server server:3000;
        keepalive 64;
    }

    # PP-ShiTuV2 食物识别服务
    upstream ftg-ppshituv2 {
        server ppshituv2:5000;
        keepalive 16;
    }

    # =========================================================================
    # HTTP -> HTTPS 重定向
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Let's Encrypt 验证路径（certbot 自动续签用）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其他所有 HTTP 请求重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS 主服务
    # =========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # =====================================================================
        # 安全响应头
        # =====================================================================
        # 禁止被嵌入 iframe（点击劫持防护）
        add_header X-Frame-Options "SAMEORIGIN" always;

        # 禁用 MIME 类型嗅探
        add_header X-Content-Type-Options "nosniff" always;

        # 启用浏览器 XSS 过滤
        add_header X-XSS-Protection "1; mode=block" always;

        # HSTS（强制 HTTPS，有效期 1 年）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 引用来源策略
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 权限策略（限制 API/传感器访问）
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

        # 内容安全策略
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

        # =====================================================================
        # 根路径 & 静态文件（可选前端部署）
        # =====================================================================
        root /usr/share/nginx/html;
        index index.html index.htm;

        # =====================================================================
        # FTG_Server API 代理
        # =====================================================================
        location /api/ {
            # 移除 /api 前缀后转发
            rewrite ^/api/(.*) /$1 break;

            # 速率限制
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://ftg-server;
            proxy_http_version 1.1;

            # WebSocket 支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 转发头部
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # 缓冲
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;
        }

        # =====================================================================
        # 健康检查端点（直接透传，不经过 /api 路径）
        # =====================================================================
        location /health {
            proxy_pass http://ftg-server;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 健康检查不需要限速
            access_log off;
        }

        # =====================================================================
        # PP-ShiTuV2 食物识别服务代理
        # =====================================================================
        location /recognition/ {
            # 移除 /recognition 前缀后转发
            rewrite ^/recognition/(.*) /$1 break;

            # 速率限制（识别服务更严格）
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;

            # 客户端 body 大小（图片上传可能较大）
            client_max_body_size 10M;

            proxy_pass http://ftg-ppshituv2;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 识别请求可能耗时较长
            proxy_read_timeout 120s;
            proxy_send_timeout 60s;

            # 缓冲
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;
        }

        # =====================================================================
        # 错误页面
        # =====================================================================
        error_page 429 /429.html;
        location = /429.html {
            internal;
            default_type application/json;
            return 429 '{"error":"too_many_requests","message":"请求过于频繁，请稍后再试","retry_after":"1"}';
        }

        error_page 502 /502.html;
        location = /502.html {
            internal;
            default_type application/json;
            return 502 '{"error":"bad_gateway","message":"服务暂时不可用，请稍后再试"}';
        }

        error_page 503 /503.html;
        location = /503.html {
            internal;
            default_type application/json;
            return 503 '{"error":"service_unavailable","message":"服务正在维护中，请稍后再试"}';
        }
    }
}
