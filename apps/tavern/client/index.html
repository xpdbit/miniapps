<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#F8F4EF" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0D1117" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="AI 酒馆 — 多 AI 大模型驱动的角色卡聊天应用，与 AI 角色畅聊，支持自定义人设和游戏模式" />
  <meta name="keywords" content="AI聊天,角色扮演,AI角色,大模型,酒馆,Tavern" />
  <meta property="og:title" content="AI 酒馆" />
  <meta property="og:description" content="多 AI 大模型驱动的角色卡聊天应用" />
  <meta property="og:type" content="website" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://mnapp.top/" />
  <link rel="preconnect" href="https://mnapp.top" />
  <link rel="dns-prefetch" href="https://mnapp.top" />
  <title>AI 酒馆 — 角色卡聊天应用</title>
  <style>
    /* System font stack displayed instantly - no FOUT */
    html { font-display: swap; }
    /* 防止 FOUC (Flash of Unstyled Content) */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #F8F4EF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
        'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    /* 全局加载指示器 */
    #app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
      color: #7A7570;
      font-size: 16px;
      background: linear-gradient(180deg, #F8F4EF 0%, #F5F0EB 100%);
    }
    #app-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(196, 154, 108, 0.2);
      border-top-color: #C49A6C;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    #app-loading-text {
      color: #A8A39E;
      font-size: 14px;
      letter-spacing: 0.3px;
      animation: pulse-text 2s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-text {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    /* 暗色模式默认样式 */
    html.dark-mode { background-color: #0D1117; }
    html.dark-mode body { background-color: #0D1117; color: #C9D1D9; }
    html.dark-mode #app-loading { background: linear-gradient(180deg, #0D1117 0%, #161B22 100%); color: #8B949E; }
    html.dark-mode #app-loading-text { color: #6E7681; }
    html.dark-mode #app-loading .spinner { border-color: rgba(196, 154, 108, 0.15); border-top-color: #C49A6C; }
  </style>
  <script>
    // 检测系统暗色模式偏好并应用（同步给 html 和 body，覆盖 FOUC 和 Taro 编译后的 body 选择器）
    (function() {
      try {
        var stored = localStorage.getItem('tavern_dark_mode');
        if (stored === 'true') {
          document.documentElement.classList.add('dark-mode');
          document.body.classList.add('dark-mode');
          // 更新 theme-color 为暗色
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#0D1117');
        }
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <div id="app">
    <div id="app-loading">
      <div class="spinner"></div>
      <span id="app-loading-text">AI 酒馆加载中...</span>
    </div>
  </div>
  <% if (process.env.NODE_ENV === 'production') { %>
  <script>
    // 生产环境错误边界
    window.addEventListener('error', function(e) {
      console.warn('[tavern] Global error:', e.message);
    });
  </script>
  <% } %>
</body>
</html>
