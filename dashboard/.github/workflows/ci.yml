# =============================================================================
# Dashboard — CI Workflow
# 在推送到 main 或发起 PR 时执行：lint → type-check → build
# =============================================================================

name: Dashboard CI

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'

concurrency:
  group: ci-dashboard-${{ github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:

  # ---------------------------------------------------------------------------
  # Lint — ESLint 代码规范检查
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=../prisma/schema.prisma

      - name: Run ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Type Check — TypeScript 类型检查 (tsc --noEmit)
  # ---------------------------------------------------------------------------
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=../prisma/schema.prisma

      - name: TypeScript type check
        run: npm run type-check

  # ---------------------------------------------------------------------------
  # Build — TypeScript 编译构建
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=../prisma/schema.prisma

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 1
