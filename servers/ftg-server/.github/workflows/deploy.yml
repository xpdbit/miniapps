# =============================================================================
# FTG_Server — Deploy Workflow
# 推送到 main 时自动构建 Docker 镜像、推送至镜像仓库、SSH 部署到服务器
#
# 注意: 此工作流使用了 GitHub Secrets，请在仓库 Settings → Secrets and
#       variables → Actions 中配置以下 secret:
#       - DOCKER_REGISTRY:     镜像仓库地址 (如 docker.io/youruser)
#       - DOCKER_USERNAME:     镜像仓库用户名
#       - DOCKER_PASSWORD:     镜像仓库密码/Token
#       - DEPLOY_HOST:         部署服务器 SSH 主机
#       - DEPLOY_PORT:         部署服务器 SSH 端口 (默认 22)
#       - DEPLOY_USER:         部署服务器 SSH 用户名
#       - DEPLOY_SSH_KEY:      部署服务器 SSH 私钥
#       - DEPLOY_PATH:         部署目录路径 (如 /opt/ftg-server)
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false  # 部署不取消，避免中间状态

env:
  NODE_VERSION: 20
  DOCKER_IMAGE_NAME: ftg-server
  DOCKER_TAG: ${{ github.sha }}

jobs:

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # 如果缺少必需的 secret，跳过部署（不报错）
    if: |
      secrets.DOCKER_REGISTRY != '' &&
      secrets.DOCKER_USERNAME != '' &&
      secrets.DOCKER_PASSWORD != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 1: Build Docker image
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.DOCKER_TAG }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # Step 2: Deploy via SSH (placeholder - 按需启用)
      # 取消下方注释并根据您的部署方式调整
      # 需要额外配置 secrets.DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY 等
      # -----------------------------------------------------------------------
